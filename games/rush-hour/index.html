<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071426">
  <title>Rush Hour · Gidi's Game Room</title>
  <style>
    * { box-sizing: border-box; }

    html {
      min-width: 320px;
      -webkit-text-size-adjust: 100%;
      background: #e8eefb;
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.95), rgba(232,238,251,.9) 46%, #dbe5f7 100%);
      color: #172033;
    }

    button,
    a {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    button { touch-action: manipulation; }

    .page {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
      padding-bottom: calc(22px + env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: calc(12px + env(safe-area-inset-top));
      padding-bottom: 8px;
    }

    .back-link {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      color: #1d4ed8;
      font-weight: 800;
      text-decoration: none;
    }

    .level-picker {
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid #9aa9c3;
      border-radius: 12px;
      background: rgba(255,255,255,.9);
      color: #172033;
      font-weight: 800;
    }

    h1 {
      margin: 4px 0 4px;
      font-size: clamp(2rem, 10vw, 3.1rem);
      line-height: 1;
      letter-spacing: -.04em;
      color: #172554;
      text-align: center;
    }

    .version {
      display: inline-block;
      margin-left: 6px;
      font-size: .34em;
      font-weight: 800;
      letter-spacing: 0;
      color: #64748b;
      vertical-align: middle;
    }

    .subtitle {
      margin: 0 auto 12px;
      max-width: 420px;
      color: #566176;
      font-size: .98rem;
      line-height: 1.35;
      text-align: center;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat {
      min-width: 0;
      padding: 9px 6px;
      border: 1px solid #c4cede;
      border-radius: 14px;
      background: rgba(255,255,255,.88);
      text-align: center;
      box-shadow: 0 4px 12px rgba(23,37,84,.07);
    }

    .stat-label {
      display: block;
      margin-bottom: 2px;
      color: #64748b;
      font-size: .67rem;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .stat-value {
      display: block;
      overflow: hidden;
      color: #172554;
      font-size: 1.04rem;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .board-wrap {
      position: relative;
      width: min(100%, 390px);
      margin: 0 auto;
      padding: 9px;
      border: 4px solid #334155;
      border-radius: 20px;
      background: #94a3b8;
      box-shadow: 0 12px 28px rgba(15,23,42,.2);
    }

    .board-wrap::before {
      content: "EXIT";
      position: absolute;
      z-index: 7;
      top: calc(41.6667% - 8px);
      right: -11px;
      width: 42px;
      padding: 2px 0 3px;
      border-radius: 7px;
      background: #f8fafc;
      color: #dc2626;
      font-size: .62rem;
      font-weight: 1000;
      letter-spacing: .04em;
      text-align: center;
      transform: rotate(90deg) translateX(50%);
      transform-origin: right top;
      pointer-events: none;
    }

    .exit-cut {
      position: absolute;
      z-index: 6;
      top: calc(33.3333% + 8px);
      right: -5px;
      width: 10px;
      height: calc(16.6667% - 1px);
      background: #e8eefb;
      pointer-events: none;
    }

    .board {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 11px;
      background-color: #e2e8f0;
      background-image:
        linear-gradient(to right, rgba(100,116,139,.34) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(100,116,139,.34) 1px, transparent 1px);
      background-size: 16.6667% 16.6667%;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .car {
      position: absolute;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border: 2px solid rgba(15,23,42,.68);
      border-radius: 13px;
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,.38),
        inset 0 -3px 0 rgba(15,23,42,.16),
        0 3px 5px rgba(15,23,42,.18);
      color: #0f172a;
      font-size: clamp(.8rem, 4.4vw, 1.25rem);
      font-weight: 1000;
      line-height: 1;
      text-align: center;
      cursor: grab;
      touch-action: none;
      transition: box-shadow .12s ease, filter .12s ease;
    }

    .car::before,
    .car::after {
      content: "";
      position: absolute;
      border-radius: 5px;
      background: rgba(226,232,240,.8);
      box-shadow: inset 0 0 0 1px rgba(15,23,42,.22);
      pointer-events: none;
    }

    .car.horizontal::before,
    .car.horizontal::after {
      top: 17%;
      bottom: 17%;
      width: 16%;
    }

    .car.horizontal::before { left: 11%; }
    .car.horizontal::after { right: 11%; }

    .car.vertical::before,
    .car.vertical::after {
      left: 17%;
      right: 17%;
      height: 16%;
    }

    .car.vertical::before { top: 11%; }
    .car.vertical::after { bottom: 11%; }

    .car-label {
      position: relative;
      z-index: 2;
      padding: 3px 5px;
      border-radius: 7px;
      background: rgba(255,255,255,.58);
      pointer-events: none;
    }

    .car.target {
      z-index: 3;
      border-color: #7f1d1d;
      background: #ef4444 !important;
      color: white;
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,.35),
        inset 0 -3px 0 rgba(127,29,29,.3),
        0 0 0 2px rgba(254,226,226,.9),
        0 4px 8px rgba(127,29,29,.3);
    }

    .car.target .car-label {
      background: rgba(127,29,29,.72);
      color: white;
    }

    .car.selected {
      z-index: 5;
      filter: brightness(1.08);
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,.45),
        inset 0 -3px 0 rgba(15,23,42,.16),
        0 0 0 4px #fbbf24,
        0 6px 12px rgba(15,23,42,.28);
    }

    .car.dragging {
      z-index: 8;
      cursor: grabbing;
      transition: none;
    }

    .message {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 10px 0 8px;
      padding: 8px 10px;
      border: 1px solid #c4cede;
      border-radius: 13px;
      background: rgba(255,255,255,.86);
      color: #334155;
      font-weight: 800;
      line-height: 1.25;
      text-align: center;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    .control-button {
      min-height: 46px;
      padding: 7px 5px;
      border: 1px solid #94a3b8;
      border-radius: 13px;
      background: white;
      color: #172554;
      font-weight: 900;
      box-shadow: 0 3px 8px rgba(15,23,42,.08);
    }

    .control-button:active { transform: translateY(1px); }

    .control-button:disabled {
      opacity: .38;
      box-shadow: none;
    }

    .small-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .small-controls button {
      min-height: 44px;
      border: 1px solid #94a3b8;
      border-radius: 13px;
      background: #e2e8f0;
      color: #172554;
      font-weight: 900;
    }

    .help {
      margin: 10px 4px 0;
      color: #64748b;
      font-size: .82rem;
      line-height: 1.35;
      text-align: center;
    }

    .overlay {
      position: fixed;
      z-index: 50;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15,23,42,.72);
    }

    .overlay.show { display: flex; }

    .dialog {
      width: min(100%, 390px);
      padding: 22px;
      border-radius: 22px;
      background: white;
      box-shadow: 0 18px 48px rgba(15,23,42,.34);
      text-align: center;
    }

    .dialog h2 {
      margin: 0 0 8px;
      color: #172554;
      font-size: 2rem;
    }

    .dialog p {
      margin: 0 0 16px;
      color: #566176;
      line-height: 1.4;
    }

    .dialog-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .dialog button {
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      font-weight: 900;
    }

    .dialog .primary {
      background: #2563eb;
      color: white;
    }

    .dialog .secondary {
      background: #e2e8f0;
      color: #172554;
    }

    @media (max-width: 350px) {
      .page { padding-left: 9px; padding-right: 9px; }
      .board-wrap { padding: 7px; border-width: 3px; border-radius: 17px; }
      .controls { gap: 6px; }
      .control-button { min-height: 43px; font-size: .9rem; }
      .stat { padding-left: 3px; padding-right: 3px; }
      .stat-value { font-size: .94rem; }
    }
  </style>

  <!-- GIDI-SUITE:START -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <link rel="stylesheet" href="../shared/gidi-suite.css?v=3.0.1">
  <script defer src="../shared/gidi-suite.js?v=3.0.1"></script>
  <!-- GIDI-SUITE:END -->
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="back-link" href="../../">← All games</a>
      <select id="levelPicker" class="level-picker" aria-label="Choose level"></select>
    </div>

    <h1>Rush Hour <span class="version">v1.1.0</span></h1>
    <p class="subtitle">Slide the colourful cars. Get the red car to the exit on the right.</p>

    <section class="stats" aria-label="Game status">
      <div class="stat">
        <span class="stat-label">Level</span>
        <span id="levelStat" class="stat-value">1 / 50</span>
      </div>
      <div class="stat">
        <span class="stat-label">Moves</span>
        <span id="moveStat" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Difficulty</span>
        <span id="difficultyStat" class="stat-value">Easy</span>
      </div>
    </section>

    <div class="board-wrap">
      <div class="exit-cut" aria-hidden="true"></div>
      <div id="board" class="board" aria-label="Rush Hour game board"></div>
    </div>

    <div id="message" class="message" aria-live="polite">Drag a car, or tap it and use the arrows.</div>

    <div class="controls" aria-label="Move selected car">
      <button id="upButton" class="control-button" type="button" aria-label="Move selected car up">▲</button>
      <button id="leftButton" class="control-button" type="button" aria-label="Move selected car left">◀</button>
      <button id="rightButton" class="control-button" type="button" aria-label="Move selected car right">▶</button>
      <button id="downButton" class="control-button" type="button" aria-label="Move selected car down">▼</button>
    </div>

    <div class="small-controls">
      <button id="undoButton" type="button">Undo</button>
      <button id="restartButton" type="button">Restart level</button>
    </div>

    <p class="help">Cars only move forwards and backwards. Each drag counts as one move.</p>
  </main>

  <div id="overlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="dialog">
      <h2 id="winTitle">Level cleared!</h2>
      <p id="winText">You escaped in 0 moves.</p>
      <div class="dialog-actions">
        <button id="replayButton" class="secondary" type="button">Play again</button>
        <button id="nextButton" class="primary" type="button">Next level</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var VERSION = "1.1.0";
      var BOARD_SIZE = 6;

      var cars = [
        { id: "R", name: "Red car", orientation: "H", lane: 2, length: 2, color: "#ef4444", target: true },
        { id: "A", name: "Purple car", orientation: "V", lane: 4, length: 2, color: "#a855f7" },
        { id: "B", name: "Blue car", orientation: "H", lane: 4, length: 2, color: "#3b82f6" },
        { id: "C", name: "Yellow car", orientation: "H", lane: 0, length: 2, color: "#facc15" },
        { id: "D", name: "Orange truck", orientation: "H", lane: 0, length: 3, color: "#fb923c" },
        { id: "E", name: "Green car", orientation: "V", lane: 5, length: 2, color: "#22c55e" },
        { id: "F", name: "Teal car", orientation: "V", lane: 2, length: 2, color: "#14b8a6" },
        { id: "G", name: "Pink car", orientation: "V", lane: 0, length: 2, color: "#f472b6" },
        { id: "H", name: "Indigo car", orientation: "H", lane: 5, length: 2, color: "#818cf8" }
      ];

      // Solver-checked progression: four puzzles at each minimum-move count from 1–10,
      // then three at 11–12 and two at 13–14. This makes the 50-level curve rise gradually.
      var levels = [
        { positions: [2, 3, 0, 0, 2, 0, 3, 2, 4], difficulty: "Easy", minimumMoves: 1 },
        { positions: [1, 3, 1, 0, 3, 3, 0, 3, 0], difficulty: "Easy", minimumMoves: 1 },
        { positions: [0, 3, 0, 4, 1, 4, 4, 0, 3], difficulty: "Easy", minimumMoves: 1 },
        { positions: [3, 4, 2, 3, 0, 0, 2, 1, 2], difficulty: "Easy", minimumMoves: 1 },
        { positions: [3, 3, 2, 1, 3, 2, 1, 0, 4], difficulty: "Easy", minimumMoves: 2 },
        { positions: [2, 1, 0, 4, 0, 3, 3, 1, 0], difficulty: "Easy", minimumMoves: 2 },
        { positions: [1, 4, 0, 1, 3, 2, 3, 1, 2], difficulty: "Easy", minimumMoves: 2 },
        { positions: [3, 4, 1, 4, 0, 1, 2, 3, 2], difficulty: "Easy", minimumMoves: 2 },
        { positions: [2, 2, 1, 0, 3, 1, 0, 2, 0], difficulty: "Easy+", minimumMoves: 3 },
        { positions: [0, 1, 3, 0, 3, 4, 0, 3, 1], difficulty: "Easy+", minimumMoves: 3 },
        { positions: [0, 3, 1, 0, 2, 4, 2, 4, 3], difficulty: "Easy+", minimumMoves: 3 },
        { positions: [1, 1, 0, 3, 0, 1, 3, 1, 1], difficulty: "Easy+", minimumMoves: 3 },
        { positions: [2, 1, 4, 0, 3, 2, 0, 4, 3], difficulty: "Easy+", minimumMoves: 4 },
        { positions: [0, 3, 2, 1, 3, 1, 2, 3, 0], difficulty: "Easy+", minimumMoves: 4 },
        { positions: [0, 4, 2, 1, 3, 2, 1, 0, 2], difficulty: "Easy+", minimumMoves: 4 },
        { positions: [0, 2, 1, 4, 1, 4, 2, 0, 1], difficulty: "Easy+", minimumMoves: 4 },
        { positions: [1, 1, 3, 0, 3, 4, 3, 4, 1], difficulty: "Medium", minimumMoves: 5 },
        { positions: [0, 2, 3, 0, 2, 3, 4, 3, 4], difficulty: "Medium", minimumMoves: 5 },
        { positions: [0, 1, 1, 0, 2, 0, 1, 3, 2], difficulty: "Medium", minimumMoves: 5 },
        { positions: [0, 2, 2, 4, 1, 1, 2, 0, 1], difficulty: "Medium", minimumMoves: 5 },
        { positions: [2, 1, 3, 4, 1, 3, 4, 0, 0], difficulty: "Medium", minimumMoves: 6 },
        { positions: [2, 2, 4, 0, 3, 1, 3, 3, 3], difficulty: "Medium", minimumMoves: 6 },
        { positions: [0, 2, 3, 1, 3, 2, 1, 4, 2], difficulty: "Medium", minimumMoves: 6 },
        { positions: [0, 2, 4, 4, 1, 2, 3, 0, 4], difficulty: "Medium", minimumMoves: 6 },
        { positions: [1, 1, 3, 0, 2, 0, 4, 4, 4], difficulty: "Tricky", minimumMoves: 7 },
        { positions: [1, 1, 3, 1, 3, 3, 3, 1, 3], difficulty: "Tricky", minimumMoves: 7 },
        { positions: [1, 2, 4, 0, 3, 2, 4, 1, 0], difficulty: "Tricky", minimumMoves: 7 },
        { positions: [2, 2, 3, 4, 1, 4, 4, 2, 3], difficulty: "Tricky", minimumMoves: 7 },
        { positions: [2, 2, 4, 0, 2, 0, 3, 3, 2], difficulty: "Tricky", minimumMoves: 8 },
        { positions: [1, 2, 3, 4, 0, 3, 3, 4, 1], difficulty: "Tricky", minimumMoves: 8 },
        { positions: [0, 1, 3, 4, 1, 4, 3, 3, 0], difficulty: "Tricky", minimumMoves: 8 },
        { positions: [2, 1, 3, 4, 1, 2, 3, 2, 3], difficulty: "Tricky", minimumMoves: 8 },
        { positions: [1, 1, 3, 3, 0, 4, 4, 1, 3], difficulty: "Hard", minimumMoves: 9 },
        { positions: [1, 1, 4, 0, 2, 0, 4, 1, 0], difficulty: "Hard", minimumMoves: 9 },
        { positions: [0, 2, 4, 4, 1, 1, 4, 4, 3], difficulty: "Hard", minimumMoves: 9 },
        { positions: [2, 1, 4, 4, 0, 1, 3, 3, 0], difficulty: "Hard", minimumMoves: 9 },
        { positions: [2, 2, 3, 3, 0, 0, 3, 2, 2], difficulty: "Hard", minimumMoves: 10 },
        { positions: [1, 2, 4, 3, 0, 2, 3, 1, 1], difficulty: "Hard", minimumMoves: 10 },
        { positions: [0, 1, 1, 4, 1, 3, 1, 3, 1], difficulty: "Hard", minimumMoves: 10 },
        { positions: [0, 2, 3, 3, 0, 3, 4, 4, 3], difficulty: "Hard", minimumMoves: 10 },
        { positions: [1, 1, 4, 3, 0, 0, 4, 3, 0], difficulty: "Expert", minimumMoves: 11 },
        { positions: [0, 1, 3, 4, 0, 1, 2, 3, 4], difficulty: "Expert", minimumMoves: 11 },
        { positions: [0, 2, 1, 4, 0, 3, 1, 3, 0], difficulty: "Expert", minimumMoves: 11 },
        { positions: [0, 1, 2, 3, 0, 4, 2, 4, 1], difficulty: "Expert", minimumMoves: 12 },
        { positions: [0, 4, 2, 4, 1, 2, 1, 4, 1], difficulty: "Expert", minimumMoves: 12 },
        { positions: [0, 2, 2, 4, 0, 1, 2, 3, 2], difficulty: "Expert", minimumMoves: 12 },
        { positions: [0, 1, 4, 3, 0, 0, 1, 3, 4], difficulty: "Master", minimumMoves: 13 },
        { positions: [0, 4, 2, 3, 0, 4, 2, 4, 1], difficulty: "Master", minimumMoves: 13 },
        { positions: [0, 3, 2, 3, 0, 0, 2, 4, 2], difficulty: "Master", minimumMoves: 14 },
        { positions: [0, 3, 2, 3, 0, 2, 2, 3, 2], difficulty: "Master", minimumMoves: 14 }
      ];

      var board = document.getElementById("board");
      var levelPicker = document.getElementById("levelPicker");
      var levelStat = document.getElementById("levelStat");
      var moveStat = document.getElementById("moveStat");
      var difficultyStat = document.getElementById("difficultyStat");
      var message = document.getElementById("message");
      var undoButton = document.getElementById("undoButton");
      var restartButton = document.getElementById("restartButton");
      var upButton = document.getElementById("upButton");
      var leftButton = document.getElementById("leftButton");
      var rightButton = document.getElementById("rightButton");
      var downButton = document.getElementById("downButton");
      var overlay = document.getElementById("overlay");
      var winText = document.getElementById("winText");
      var replayButton = document.getElementById("replayButton");
      var nextButton = document.getElementById("nextButton");

      var currentLevel = 0;
      var positions = [];
      var moveCount = 0;
      var history = [];
      var selectedIndex = -1;
      var drag = null;
      var won = false;
      var carElements = [];

      function safeLoadLevel() {
        var saved = 0;
        try {
          saved = parseInt(window.localStorage.getItem("rushHourLevel-" + VERSION), 10) || 0;
        } catch (error) {
          saved = 0;
        }
        return Math.max(0, Math.min(levels.length - 1, saved));
      }

      function safeSaveLevel() {
        try {
          window.localStorage.setItem("rushHourLevel-" + VERSION, String(currentLevel));
        } catch (error) {
          // The game still works when private browsing blocks storage.
        }
      }

      function fillLevelPicker() {
        var i;
        for (i = 0; i < levels.length; i += 1) {
          var option = document.createElement("option");
          option.value = String(i);
          option.textContent = "Level " + (i + 1);
          levelPicker.appendChild(option);
        }
      }

      function createCarElements() {
        board.innerHTML = "";
        carElements = [];
        cars.forEach(function (car, index) {
          var element = document.createElement("div");
          var label = document.createElement("span");
          element.className = "car " + (car.orientation === "H" ? "horizontal" : "vertical") + (car.target ? " target" : "");
          element.style.background = car.color;
          element.setAttribute("role", "button");
          element.setAttribute("tabindex", "0");
          element.setAttribute("aria-label", car.name + ". " + (car.orientation === "H" ? "Moves left and right." : "Moves up and down."));
          element.dataset.index = String(index);
          label.className = "car-label";
          label.textContent = car.target ? "GO" : car.id;
          element.appendChild(label);
          board.appendChild(element);
          carElements.push(element);

          element.addEventListener("pointerdown", startDrag);
          element.addEventListener("click", function () {
            selectCar(index);
          });
          element.addEventListener("keydown", function (event) {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              selectCar(index);
            }
          });
        });
      }

      function occupancy(ignoreIndex) {
        var grid = [];
        var row;
        var col;
        var i;
        for (row = 0; row < BOARD_SIZE; row += 1) {
          grid[row] = [];
          for (col = 0; col < BOARD_SIZE; col += 1) {
            grid[row][col] = -1;
          }
        }

        for (i = 0; i < cars.length; i += 1) {
          if (i === ignoreIndex) {
            continue;
          }
          var car = cars[i];
          var position = positions[i];
          var part;
          for (part = 0; part < car.length; part += 1) {
            if (car.orientation === "H") {
              grid[car.lane][position + part] = i;
            } else {
              grid[position + part][car.lane] = i;
            }
          }
        }
        return grid;
      }

      function movementRange(index) {
        var car = cars[index];
        var position = positions[index];
        var grid = occupancy(index);
        var min = position;
        var max = position;
        var test;
        var part;
        var clear;

        for (test = position - 1; test >= 0; test -= 1) {
          clear = true;
          for (part = 0; part < car.length; part += 1) {
            if (car.orientation === "H") {
              if (grid[car.lane][test + part] !== -1) {
                clear = false;
                break;
              }
            } else if (grid[test + part][car.lane] !== -1) {
              clear = false;
              break;
            }
          }
          if (!clear) {
            break;
          }
          min = test;
        }

        for (test = position + 1; test <= BOARD_SIZE - car.length; test += 1) {
          clear = true;
          for (part = 0; part < car.length; part += 1) {
            if (car.orientation === "H") {
              if (grid[car.lane][test + part] !== -1) {
                clear = false;
                break;
              }
            } else if (grid[test + part][car.lane] !== -1) {
              clear = false;
              break;
            }
          }
          if (!clear) {
            break;
          }
          max = test;
        }

        return { min: min, max: max };
      }

      function render() {
        var cell = board.clientWidth / BOARD_SIZE;
        cars.forEach(function (car, index) {
          var element = carElements[index];
          var coordinate = positions[index];
          var inset = Math.max(3, cell * 0.07);
          var x = car.orientation === "H" ? coordinate * cell : car.lane * cell;
          var y = car.orientation === "H" ? car.lane * cell : coordinate * cell;
          var width = (car.orientation === "H" ? car.length : 1) * cell;
          var height = (car.orientation === "H" ? 1 : car.length) * cell;

          element.style.left = (x + inset) + "px";
          element.style.top = (y + inset) + "px";
          element.style.width = Math.max(20, width - inset * 2) + "px";
          element.style.height = Math.max(20, height - inset * 2) + "px";
          element.classList.toggle("selected", index === selectedIndex);
        });

        levelPicker.value = String(currentLevel);
        levelStat.textContent = (currentLevel + 1) + " / " + levels.length;
        moveStat.textContent = String(moveCount);
        difficultyStat.textContent = levels[currentLevel].difficulty;
        undoButton.disabled = history.length === 0 || won;
        updateArrowButtons();
      }

      function selectCar(index) {
        if (won) {
          return;
        }
        selectedIndex = index;
        var car = cars[index];
        message.textContent = car.name + " selected. " + (car.orientation === "H" ? "Move it left or right." : "Move it up or down.");
        render();
      }

      function updateArrowButtons() {
        var buttons = [upButton, leftButton, rightButton, downButton];
        buttons.forEach(function (button) {
          button.disabled = true;
        });

        if (selectedIndex < 0 || won) {
          return;
        }

        var car = cars[selectedIndex];
        var range = movementRange(selectedIndex);
        var position = positions[selectedIndex];
        if (car.orientation === "H") {
          leftButton.disabled = position <= range.min;
          rightButton.disabled = position >= range.max;
        } else {
          upButton.disabled = position <= range.min;
          downButton.disabled = position >= range.max;
        }
      }

      function saveHistory() {
        history.push(positions.slice());
        if (history.length > 100) {
          history.shift();
        }
      }

      function moveSelected(delta) {
        if (selectedIndex < 0 || won) {
          return;
        }
        var range = movementRange(selectedIndex);
        var next = positions[selectedIndex] + delta;
        if (next < range.min || next > range.max) {
          return;
        }
        saveHistory();
        positions[selectedIndex] = next;
        moveCount += 1;
        message.textContent = "Good move. Keep clearing the red car's path.";
        render();
        checkWin();
      }

      function startDrag(event) {
        if (won || event.button > 0) {
          return;
        }
        event.preventDefault();
        var index = parseInt(event.currentTarget.dataset.index, 10);
        selectCar(index);
        var range = movementRange(index);
        var car = cars[index];
        var cell = board.clientWidth / BOARD_SIZE;
        drag = {
          index: index,
          startPointer: car.orientation === "H" ? event.clientX : event.clientY,
          startPosition: positions[index],
          previewPosition: positions[index],
          min: range.min,
          max: range.max,
          cell: cell,
          moved: false,
          pointerId: event.pointerId
        };
        event.currentTarget.classList.add("dragging");
        document.addEventListener("pointermove", continueDrag, { passive: false });
        document.addEventListener("pointerup", finishDrag, { passive: false });
        document.addEventListener("pointercancel", finishDrag, { passive: false });
      }

      function continueDrag(event) {
        if (!drag || event.pointerId !== drag.pointerId) {
          return;
        }
        event.preventDefault();
        var car = cars[drag.index];
        var pointer = car.orientation === "H" ? event.clientX : event.clientY;
        var raw = drag.startPosition + (pointer - drag.startPointer) / drag.cell;
        var clamped = Math.max(drag.min, Math.min(drag.max, raw));
        var element = carElements[drag.index];
        var inset = Math.max(3, drag.cell * 0.07);
        drag.previewPosition = clamped;
        drag.moved = drag.moved || Math.abs(pointer - drag.startPointer) > 5;

        if (car.orientation === "H") {
          element.style.left = (clamped * drag.cell + inset) + "px";
        } else {
          element.style.top = (clamped * drag.cell + inset) + "px";
        }
      }

      function finishDrag(event) {
        if (!drag || event.pointerId !== drag.pointerId) {
          return;
        }
        event.preventDefault();
        var index = drag.index;
        var finalPosition = Math.round(drag.previewPosition);
        finalPosition = Math.max(drag.min, Math.min(drag.max, finalPosition));
        carElements[index].classList.remove("dragging");

        if (finalPosition !== drag.startPosition) {
          saveHistory();
          positions[index] = finalPosition;
          moveCount += 1;
          message.textContent = "Good move. Keep clearing the red car's path.";
        }

        drag = null;
        document.removeEventListener("pointermove", continueDrag);
        document.removeEventListener("pointerup", finishDrag);
        document.removeEventListener("pointercancel", finishDrag);
        render();
        checkWin();
      }

      function checkWin() {
        if (positions[0] !== BOARD_SIZE - cars[0].length || won) {
          return;
        }
        won = true;
        message.textContent = "The red car escaped!";
        render();
        winText.textContent = "You escaped level " + (currentLevel + 1) + " in " + moveCount + (moveCount === 1 ? " move." : " moves.");
        nextButton.textContent = currentLevel === levels.length - 1 ? "Finish" : "Next level";
        window.setTimeout(function () {
          overlay.classList.add("show");
          nextButton.focus();
        }, 220);
      }

      function loadLevel(index) {
        currentLevel = Math.max(0, Math.min(levels.length - 1, index));
        positions = levels[currentLevel].positions.slice();
        moveCount = 0;
        history = [];
        selectedIndex = -1;
        won = false;
        overlay.classList.remove("show");
        message.textContent = "Drag a car, or tap it and use the arrows.";
        safeSaveLevel();
        render();
      }

      function undo() {
        if (history.length === 0 || won) {
          return;
        }
        positions = history.pop();
        moveCount = Math.max(0, moveCount - 1);
        message.textContent = "Last move undone.";
        render();
      }

      upButton.addEventListener("click", function () { moveSelected(-1); });
      leftButton.addEventListener("click", function () { moveSelected(-1); });
      rightButton.addEventListener("click", function () { moveSelected(1); });
      downButton.addEventListener("click", function () { moveSelected(1); });
      undoButton.addEventListener("click", undo);
      restartButton.addEventListener("click", function () { loadLevel(currentLevel); });
      replayButton.addEventListener("click", function () { loadLevel(currentLevel); });
      nextButton.addEventListener("click", function () {
        if (currentLevel < levels.length - 1) {
          loadLevel(currentLevel + 1);
        } else {
          overlay.classList.remove("show");
          message.textContent = "You cleared every level! Choose any level to play again.";
          won = false;
          render();
        }
      });
      levelPicker.addEventListener("change", function () {
        loadLevel(parseInt(levelPicker.value, 10));
      });

      document.addEventListener("keydown", function (event) {
        if (overlay.classList.contains("show")) {
          return;
        }
        if (event.key === "ArrowLeft" || event.key === "ArrowUp") {
          event.preventDefault();
          moveSelected(-1);
        } else if (event.key === "ArrowRight" || event.key === "ArrowDown") {
          event.preventDefault();
          moveSelected(1);
        } else if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
          event.preventDefault();
          undo();
        }
      });

      window.addEventListener("resize", render);
      fillLevelPicker();
      createCarElements();
      currentLevel = safeLoadLevel();
      loadLevel(currentLevel);
    }());
  </script>
</body>
</html>
