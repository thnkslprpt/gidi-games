<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071426">
  <title>Space Invaders · Gidi's Game Room</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050816;
      --panel: #0b1230;
      --ink: #f5f7ff;
      --muted: #9fb2df;
      --cyan: #47e6ff;
      --pink: #ff4fc8;
      --lime: #8cff6a;
      --gold: #ffd45a;
      --danger: #ff5b6e;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: flex;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .app {
      width: min(100%, 520px);
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: radial-gradient(circle at 50% 15%, #152253 0%, #080d24 42%, #03050d 100%);
      position: relative;
    }

    .topbar {
      min-height: 46px;
      padding: 7px 10px 5px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 6px;
      align-items: center;
      background: rgba(5, 8, 22, 0.86);
      border-bottom: 1px solid rgba(71, 230, 255, 0.25);
      z-index: 5;
    }

    .brand { min-width: 0; }
    .brand strong { display: block; font-size: 14px; letter-spacing: 0.08em; white-space: nowrap; }
    .version { display: block; margin-top: 1px; color: var(--muted); font-size: 9px; }

    .wave-pill {
      border: 1px solid rgba(71, 230, 255, 0.4);
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      background: rgba(71, 230, 255, 0.08);
    }

    .scorebox { text-align: right; min-width: 0; }
    .scorebox span { display: block; color: var(--muted); font-size: 9px; }
    .scorebox strong { display: block; font-size: 15px; font-variant-numeric: tabular-nums; }

    .stage {
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .status-row {
      position: absolute;
      top: 7px;
      left: 8px;
      right: 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 2;
      font-size: 11px;
      font-weight: 800;
      text-shadow: 0 1px 3px #000;
    }

    .lives { color: var(--pink); letter-spacing: 2px; }
    .power { color: var(--gold); text-align: right; min-height: 15px; }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      text-align: center;
      background: rgba(2, 4, 14, 0.72);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 4;
    }

    .overlay.hidden { display: none; }
    .overlay h1 { margin: 0; font-size: clamp(27px, 9vw, 44px); line-height: 0.95; letter-spacing: 0.04em; text-transform: uppercase; }
    .overlay h1 span { display: block; color: var(--cyan); text-shadow: 0 0 16px rgba(71, 230, 255, 0.65); }
    .overlay p { max-width: 330px; margin: 0; color: #d3dcf6; font-size: 14px; line-height: 1.35; }
    .overlay .tiny { color: var(--muted); font-size: 11px; }

    .primary {
      min-width: 170px;
      border: 0;
      border-radius: 999px;
      padding: 13px 20px;
      background: linear-gradient(135deg, var(--cyan), #6d7dff);
      color: #020411;
      font: inherit;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 0 24px rgba(71, 230, 255, 0.35);
    }

    .controls {
      min-height: 86px;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: minmax(0, 1fr) 88px;
      gap: 10px;
      background: rgba(5, 8, 22, 0.94);
      border-top: 1px solid rgba(71, 230, 255, 0.22);
      z-index: 5;
    }

    .move-pad { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .control-btn {
      min-width: 0;
      min-height: 62px;
      border: 1px solid rgba(159, 178, 223, 0.38);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(25, 38, 83, 0.95), rgba(9, 15, 38, 0.95));
      color: var(--ink);
      font: inherit;
      font-size: 25px;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      touch-action: none;
    }

    .control-btn.active { transform: translateY(1px); background: #1a2e66; border-color: var(--cyan); }
    .fire { color: #101300; background: linear-gradient(180deg, #b9ff7d, #58dc4f); border-color: #c9ff9f; font-size: 14px; letter-spacing: 0.08em; }
    .fire.active { background: #66d959; border-color: white; }

    .pause-btn {
      position: absolute;
      right: 8px;
      bottom: 8px;
      z-index: 3;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      background: rgba(5,8,22,0.62);
      font: inherit;
      font-size: 15px;
    }

    @media (orientation: landscape) and (max-height: 500px) {
      .app { grid-template-rows: auto minmax(0, 1fr); grid-template-columns: minmax(0, 1fr) 104px; }
      .topbar { grid-column: 1 / 3; min-height: 38px; padding: 4px 8px; }
      .stage { grid-column: 1; grid-row: 2; }
      .controls { grid-column: 2; grid-row: 2; min-height: 0; grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; padding: 8px; border-top: 0; border-left: 1px solid rgba(71,230,255,.22); }
      .move-pad { grid-template-columns: 1fr 1fr; }
      .control-btn { min-height: 48px; border-radius: 14px; }
      .fire { min-height: 58px; }
      .brand strong { font-size: 12px; }
    }

    @media (max-width: 340px) {
      .controls { grid-template-columns: minmax(0, 1fr) 78px; gap: 7px; padding-left: 7px; padding-right: 7px; }
      .control-btn { min-height: 58px; }
      .wave-pill { padding-left: 7px; padding-right: 7px; }
    }
  </style>

  <!-- GIDI-SUITE:START -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <link rel="stylesheet" href="../shared/gidi-suite.css?v=3.0.1">
  <script defer src="../shared/gidi-suite.js?v=3.0.1"></script>
  <!-- GIDI-SUITE:END -->
</head>
<body>
  <main class="app" aria-label="Space Invaders game">
    <header class="topbar">
      <div class="brand">
        <strong>SPACE INVADERS</strong>
        <small class="version">v1.0.0</small>
      </div>
      <div class="wave-pill" id="waveLabel">WAVE 1</div>
      <div class="scorebox"><span>SCORE</span><strong id="scoreLabel">000000</strong></div>
    </header>

    <section class="stage" id="stage">
      <canvas id="game" aria-label="Space Invaders play area"></canvas>
      <div class="status-row">
        <div class="lives" id="livesLabel">♥ ♥ ♥</div>
        <div class="power" id="powerLabel"></div>
      </div>
      <button class="pause-btn" id="pauseBtn" type="button" aria-label="Pause game">Ⅱ</button>

      <div class="overlay" id="overlay">
        <h1>GIDI'S <span>SPACE INVADERS</span></h1>
        <p id="overlayText">Defend Earth through endless alien waves. Collect weapon upgrades, rebuild your shields, and survive a giant boss every five waves.</p>
        <button class="primary" id="startBtn" type="button">Launch</button>
        <p class="tiny">Drag the ship or use ◀ ▶. Hold FIRE. Keyboard: arrows, A/D, space, P.</p>
      </div>
    </section>

    <nav class="controls" aria-label="Game controls">
      <div class="move-pad">
        <button class="control-btn" id="leftBtn" type="button" aria-label="Move left">◀</button>
        <button class="control-btn" id="rightBtn" type="button" aria-label="Move right">▶</button>
      </div>
      <button class="control-btn fire" id="fireBtn" type="button">FIRE</button>
    </nav>
  </main>

  <script>
    (function () {
      'use strict';

      var canvas = document.getElementById('game');
      var ctx = canvas.getContext('2d');
      var stage = document.getElementById('stage');
      var overlay = document.getElementById('overlay');
      var overlayText = document.getElementById('overlayText');
      var startBtn = document.getElementById('startBtn');
      var pauseBtn = document.getElementById('pauseBtn');
      var leftBtn = document.getElementById('leftBtn');
      var rightBtn = document.getElementById('rightBtn');
      var fireBtn = document.getElementById('fireBtn');
      var scoreLabel = document.getElementById('scoreLabel');
      var waveLabel = document.getElementById('waveLabel');
      var livesLabel = document.getElementById('livesLabel');
      var powerLabel = document.getElementById('powerLabel');

      var WORLD_W = 320;
      var WORLD_H = 520;
      var dpr = 1;
      var cssW = 320;
      var cssH = 520;
      var state = 'menu';
      var lastTime = 0;
      var elapsed = 0;
      var score = 0;
      var highScore = readHighScore();
      var wave = 1;
      var lives = 3;
      var combo = 1;
      var shake = 0;
      var flash = 0;
      var waveClearTimer = 0;
      var input = { left: false, right: false, fire: false };
      var player;
      var enemies = [];
      var playerBullets = [];
      var enemyBullets = [];
      var particles = [];
      var powerups = [];
      var shieldBlocks = [];
      var stars = [];
      var enemyDirection = 1;
      var enemySpeed = 16;
      var enemyDrop = 0;
      var enemyShootTimer = 0;
      var audioCtx = null;
      var dragActive = false;

      function readHighScore() {
        try { return Number(localStorage.getItem('gidi-space-invaders-high') || 0); }
        catch (e) { return 0; }
      }

      function saveHighScore() {
        if (score <= highScore) return;
        highScore = score;
        try { localStorage.setItem('gidi-space-invaders-high', String(highScore)); }
        catch (e) {}
      }

      function initAudio() {
        if (!audioCtx) {
          var AC = window.AudioContext || window.webkitAudioContext;
          if (AC) audioCtx = new AC();
        }
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      }

      function sound(freq, duration, type, volume, slide) {
        if (!audioCtx) return;
        var now = audioCtx.currentTime;
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = type || 'square';
        osc.frequency.setValueAtTime(freq, now);
        if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(30, slide), now + duration);
        gain.gain.setValueAtTime(volume || 0.04, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration);
      }

      function buzz(pattern) {
        if (navigator.vibrate) navigator.vibrate(pattern);
      }

      function resize() {
        var rect = stage.getBoundingClientRect();
        cssW = Math.max(1, rect.width);
        cssH = Math.max(1, rect.height);
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(cssW * dpr);
        canvas.height = Math.round(cssH * dpr);
        canvas.style.width = cssW + 'px';
        canvas.style.height = cssH + 'px';
      }

      function makeStars() {
        stars = [];
        for (var i = 0; i < 75; i++) {
          stars.push({
            x: Math.random() * WORLD_W,
            y: Math.random() * WORLD_H,
            s: 0.35 + Math.random() * 1.8,
            v: 4 + Math.random() * 18,
            a: 0.25 + Math.random() * 0.75
          });
        }
      }

      function resetGame() {
        score = 0;
        wave = 1;
        lives = 3;
        combo = 1;
        shake = 0;
        flash = 0;
        playerBullets = [];
        enemyBullets = [];
        particles = [];
        powerups = [];
        player = {
          x: WORLD_W / 2,
          y: WORLD_H - 38,
          w: 25,
          h: 18,
          speed: 180,
          cooldown: 0,
          invincible: 0,
          rapid: 0,
          spread: 0,
          shield: 0
        };
        buildWave();
        updateHud();
      }

      function buildWave() {
        enemies = [];
        playerBullets = [];
        enemyBullets = [];
        powerups = [];
        enemyDirection = 1;
        enemyDrop = 0;
        enemyShootTimer = 0.8;
        waveClearTimer = 0;
        combo = 1;

        buildShields();

        if (wave % 5 === 0) {
          enemies.push({
            type: 'boss', x: WORLD_W / 2, y: 72, w: 104, h: 42,
            hp: 22 + wave * 3, maxHp: 22 + wave * 3,
            phase: 0, shoot: 0.45, value: 2500 + wave * 150
          });
          enemySpeed = 28 + wave * 1.4;
        } else {
          var cols = Math.min(8, 5 + Math.floor((wave - 1) / 2));
          var rows = Math.min(5, 3 + Math.floor((wave - 1) / 3));
          var gapX = 31;
          var gapY = 29;
          var startX = WORLD_W / 2 - ((cols - 1) * gapX) / 2;
          for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
              var type = r === 0 ? 2 : (r < 3 ? 1 : 0);
              enemies.push({
                type: type,
                x: startX + c * gapX,
                y: 54 + r * gapY,
                w: 22,
                h: 16,
                hp: 1 + (wave > 8 && type === 2 ? 1 : 0),
                phase: (r * cols + c) * 0.2,
                value: (type + 1) * 100
              });
            }
          }
          enemySpeed = 12 + wave * 1.8;
        }
        waveLabel.textContent = wave % 5 === 0 ? 'BOSS ' + wave : 'WAVE ' + wave;
      }

      function buildShields() {
        shieldBlocks = [];
        var shieldCount = WORLD_W < 300 ? 3 : 4;
        for (var s = 0; s < shieldCount; s++) {
          var cx = ((s + 1) * WORLD_W) / (shieldCount + 1);
          for (var row = 0; row < 3; row++) {
            for (var col = -3; col <= 3; col++) {
              if (row === 2 && Math.abs(col) <= 1) continue;
              shieldBlocks.push({ x: cx + col * 5, y: WORLD_H - 104 + row * 5, hp: 2 });
            }
          }
        }
      }

      function startGame() {
        initAudio();
        resetGame();
        state = 'playing';
        overlay.classList.add('hidden');
        pauseBtn.textContent = 'Ⅱ';
        sound(180, 0.2, 'sawtooth', 0.04, 520);
      }

      function setPaused(paused) {
        if (state !== 'playing' && state !== 'paused') return;
        state = paused ? 'paused' : 'playing';
        pauseBtn.textContent = paused ? '▶' : 'Ⅱ';
        if (paused) {
          overlayText.innerHTML = 'Mission paused.<br><span style="color:#9fb2df">High score: ' + highScore.toLocaleString() + '</span>';
          startBtn.textContent = 'Resume';
          overlay.classList.remove('hidden');
        } else {
          overlay.classList.add('hidden');
          lastTime = performance.now();
        }
      }

      function gameOver() {
        state = 'gameover';
        saveHighScore();
        overlayText.innerHTML = 'Earth has fallen — but your score lives on.<br><strong>Score: ' + score.toLocaleString() + '</strong> · High: ' + highScore.toLocaleString();
        startBtn.textContent = 'Play Again';
        overlay.classList.remove('hidden');
        sound(180, 0.7, 'sawtooth', 0.06, 45);
        buzz([80, 50, 120]);
      }

      function nextWave() {
        wave += 1;
        score += 500 * wave;
        if (wave % 4 === 1 && lives < 5) lives += 1;
        player.y = WORLD_H - 38;
        player.x = WORLD_W / 2;
        player.invincible = 1.5;
        buildWave();
        updateHud();
        sound(420, 0.22, 'triangle', 0.045, 880);
      }

      function firePlayer() {
        if (player.cooldown > 0 || state !== 'playing') return;
        var rapid = player.rapid > 0;
        player.cooldown = rapid ? 0.105 : 0.22;
        var bulletSpeed = -330;
        if (player.spread > 0) {
          playerBullets.push({ x: player.x - 7, y: player.y - 13, vx: -72, vy: bulletSpeed, w: 3, h: 10, damage: 1 });
          playerBullets.push({ x: player.x, y: player.y - 16, vx: 0, vy: bulletSpeed - 20, w: 3, h: 11, damage: 1 });
          playerBullets.push({ x: player.x + 7, y: player.y - 13, vx: 72, vy: bulletSpeed, w: 3, h: 10, damage: 1 });
        } else {
          playerBullets.push({ x: player.x, y: player.y - 16, vx: 0, vy: bulletSpeed, w: 3, h: 11, damage: 1 });
        }
        sound(rapid ? 410 : 340, 0.055, 'square', 0.022, rapid ? 510 : 420);
      }

      function fireEnemy(enemy, aimed) {
        var speed = 125 + wave * 4;
        var dx = aimed ? (player.x - enemy.x) * 0.22 : 0;
        enemyBullets.push({
          x: enemy.x,
          y: enemy.y + enemy.h / 2,
          vx: Math.max(-70, Math.min(70, dx)),
          vy: speed,
          w: 4,
          h: 11
        });
      }

      function hitPlayer() {
        if (player.invincible > 0) return;
        if (player.shield > 0) {
          player.shield = 0;
          player.invincible = 0.7;
          burst(player.x, player.y, '#47e6ff', 22, 95);
          sound(180, 0.25, 'triangle', 0.05, 620);
          buzz(35);
          updateHud();
          return;
        }
        lives -= 1;
        player.invincible = 2;
        player.rapid = 0;
        player.spread = 0;
        combo = 1;
        shake = 14;
        flash = 0.3;
        burst(player.x, player.y, '#ff5b6e', 36, 145);
        sound(110, 0.45, 'sawtooth', 0.07, 38);
        buzz([60, 40, 60]);
        updateHud();
        if (lives <= 0) gameOver();
      }

      function dropPowerup(x, y, forced) {
        var chance = forced ? 1 : 0.11;
        if (Math.random() > chance) return;
        var options = ['rapid', 'spread', 'shield', 'repair'];
        var type = options[Math.floor(Math.random() * options.length)];
        powerups.push({ x: x, y: y, vy: 62, type: type, r: 8, spin: 0 });
      }

      function collectPowerup(p) {
        if (p.type === 'rapid') player.rapid = Math.max(player.rapid, 9);
        if (p.type === 'spread') player.spread = Math.max(player.spread, 9);
        if (p.type === 'shield') player.shield = 1;
        if (p.type === 'repair') {
          var repaired = 0;
          for (var i = 0; i < shieldBlocks.length && repaired < 18; i++) {
            if (shieldBlocks[i].hp < 2) { shieldBlocks[i].hp = 2; repaired++; }
          }
          if (repaired === 0 && lives < 5) lives++;
        }
        score += 250;
        burst(p.x, p.y, powerColor(p.type), 22, 90);
        sound(520, 0.18, 'triangle', 0.05, 980);
        buzz(20);
        updateHud();
      }

      function powerColor(type) {
        if (type === 'rapid') return '#ffd45a';
        if (type === 'spread') return '#ff4fc8';
        if (type === 'shield') return '#47e6ff';
        return '#8cff6a';
      }

      function burst(x, y, color, count, speed) {
        for (var i = 0; i < count; i++) {
          var a = Math.random() * Math.PI * 2;
          var v = speed * (0.25 + Math.random() * 0.75);
          particles.push({
            x: x, y: y,
            vx: Math.cos(a) * v,
            vy: Math.sin(a) * v,
            life: 0.25 + Math.random() * 0.55,
            max: 0.8,
            size: 1 + Math.random() * 2.8,
            color: color
          });
        }
      }

      function rectHit(a, b) {
        return Math.abs(a.x - b.x) * 2 < (a.w + b.w) && Math.abs(a.y - b.y) * 2 < (a.h + b.h);
      }

      function circleRectHit(c, r) {
        var dx = Math.abs(c.x - r.x);
        var dy = Math.abs(c.y - r.y);
        if (dx > r.w / 2 + c.r || dy > r.h / 2 + c.r) return false;
        if (dx <= r.w / 2 || dy <= r.h / 2) return true;
        dx -= r.w / 2;
        dy -= r.h / 2;
        return dx * dx + dy * dy <= c.r * c.r;
      }

      function update(dt) {
        elapsed += dt;
        for (var si = 0; si < stars.length; si++) {
          stars[si].y += stars[si].v * dt;
          if (stars[si].y > WORLD_H) { stars[si].y = 0; stars[si].x = Math.random() * WORLD_W; }
        }

        if (state !== 'playing') {
          updateParticles(dt);
          return;
        }

        if (shake > 0) shake = Math.max(0, shake - dt * 34);
        if (flash > 0) flash = Math.max(0, flash - dt);
        if (player.invincible > 0) player.invincible -= dt;
        if (player.rapid > 0) player.rapid -= dt;
        if (player.spread > 0) player.spread -= dt;
        if (player.cooldown > 0) player.cooldown -= dt;

        var move = (input.right ? 1 : 0) - (input.left ? 1 : 0);
        player.x += move * player.speed * dt;
        player.x = Math.max(16, Math.min(WORLD_W - 16, player.x));
        if (input.fire) firePlayer();

        updateBullets(dt);
        updateEnemies(dt);
        updatePowerups(dt);
        updateParticles(dt);
        checkCollisions();

        if (enemies.length === 0 && waveClearTimer <= 0) waveClearTimer = 1.25;
        if (waveClearTimer > 0) {
          waveClearTimer -= dt;
          if (waveClearTimer <= 0) nextWave();
        }
        updateHud();
      }

      function updateBullets(dt) {
        var i;
        for (i = playerBullets.length - 1; i >= 0; i--) {
          var b = playerBullets[i];
          b.x += b.vx * dt;
          b.y += b.vy * dt;
          if (b.y < -20 || b.x < -20 || b.x > WORLD_W + 20) playerBullets.splice(i, 1);
        }
        for (i = enemyBullets.length - 1; i >= 0; i--) {
          var e = enemyBullets[i];
          e.x += e.vx * dt;
          e.y += e.vy * dt;
          if (e.y > WORLD_H + 20 || e.x < -20 || e.x > WORLD_W + 20) enemyBullets.splice(i, 1);
        }
      }

      function updateEnemies(dt) {
        if (!enemies.length) return;
        var boss = enemies.length === 1 && enemies[0].type === 'boss' ? enemies[0] : null;
        if (boss) {
          boss.phase += dt;
          boss.x = WORLD_W / 2 + Math.sin(boss.phase * 0.85) * 88;
          boss.y = 70 + Math.sin(boss.phase * 1.7) * 10;
          boss.shoot -= dt;
          if (boss.shoot <= 0) {
            fireEnemy({ x: boss.x - 32, y: boss.y + 10, h: boss.h }, true);
            fireEnemy({ x: boss.x, y: boss.y + 13, h: boss.h }, false);
            fireEnemy({ x: boss.x + 32, y: boss.y + 10, h: boss.h }, true);
            boss.shoot = Math.max(0.25, 0.7 - wave * 0.018);
            sound(150, 0.07, 'sawtooth', 0.018, 110);
          }
          return;
        }

        var left = Infinity;
        var right = -Infinity;
        var lowest = 0;
        var speedBoost = 1 + Math.max(0, 18 - enemies.length) * 0.035;
        for (var i = 0; i < enemies.length; i++) {
          enemies[i].x += enemyDirection * enemySpeed * speedBoost * dt;
          enemies[i].phase += dt * 3;
          left = Math.min(left, enemies[i].x - enemies[i].w / 2);
          right = Math.max(right, enemies[i].x + enemies[i].w / 2);
          lowest = Math.max(lowest, enemies[i].y + enemies[i].h / 2);
        }
        if (left < 10 || right > WORLD_W - 10) {
          enemyDirection *= -1;
          for (var j = 0; j < enemies.length; j++) enemies[j].y += 12;
          enemyDrop += 12;
          sound(90 + Math.min(140, enemyDrop), 0.045, 'square', 0.018);
        }
        if (lowest > player.y - 22) {
          lives = 0;
          updateHud();
          gameOver();
          return;
        }

        enemyShootTimer -= dt;
        if (enemyShootTimer <= 0 && enemies.length) {
          var shooters = [];
          for (var c = 0; c < enemies.length; c++) {
            var candidate = enemies[c];
            var blocked = false;
            for (var k = 0; k < enemies.length; k++) {
              if (enemies[k].y > candidate.y && Math.abs(enemies[k].x - candidate.x) < 12) { blocked = true; break; }
            }
            if (!blocked) shooters.push(candidate);
          }
          if (shooters.length) fireEnemy(shooters[Math.floor(Math.random() * shooters.length)], wave > 6 && Math.random() < 0.35);
          enemyShootTimer = Math.max(0.25, 1.05 - wave * 0.045) * (0.75 + Math.random() * 0.7);
        }
      }

      function updatePowerups(dt) {
        for (var i = powerups.length - 1; i >= 0; i--) {
          powerups[i].y += powerups[i].vy * dt;
          powerups[i].spin += dt * 5;
          if (powerups[i].y > WORLD_H + 20) powerups.splice(i, 1);
        }
      }

      function updateParticles(dt) {
        for (var i = particles.length - 1; i >= 0; i--) {
          var p = particles[i];
          p.life -= dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vx *= Math.pow(0.96, dt * 60);
          p.vy = p.vy * Math.pow(0.97, dt * 60) + 20 * dt;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      function damageShieldAt(x, y) {
        for (var i = shieldBlocks.length - 1; i >= 0; i--) {
          var s = shieldBlocks[i];
          if (Math.abs(s.x - x) < 5 && Math.abs(s.y - y) < 6 && s.hp > 0) {
            s.hp -= 1;
            burst(s.x, s.y, '#8cff6a', 5, 35);
            return true;
          }
        }
        return false;
      }

      function checkCollisions() {
        var i, j;
        for (i = playerBullets.length - 1; i >= 0; i--) {
          var pb = playerBullets[i];
          if (damageShieldAt(pb.x, pb.y)) { playerBullets.splice(i, 1); continue; }
          for (j = enemies.length - 1; j >= 0; j--) {
            var en = enemies[j];
            if (rectHit(pb, en)) {
              playerBullets.splice(i, 1);
              en.hp -= pb.damage;
              burst(pb.x, pb.y, en.type === 'boss' ? '#ff4fc8' : '#47e6ff', en.hp <= 0 ? 14 : 5, en.hp <= 0 ? 95 : 40);
              if (en.hp <= 0) {
                score += en.value * combo;
                combo = Math.min(5, combo + 0.15);
                var wasBoss = en.type === 'boss';
                enemies.splice(j, 1);
                dropPowerup(en.x, en.y, wasBoss);
                shake = wasBoss ? 18 : 3;
                flash = wasBoss ? 0.45 : 0.08;
                sound(wasBoss ? 85 : 260, wasBoss ? 0.65 : 0.12, 'sawtooth', wasBoss ? 0.075 : 0.035, wasBoss ? 35 : 130);
                if (wasBoss) buzz([50, 30, 50, 30, 100]);
              } else {
                score += 20;
                sound(470, 0.045, 'square', 0.018, 360);
              }
              break;
            }
          }
        }

        for (i = enemyBullets.length - 1; i >= 0; i--) {
          var eb = enemyBullets[i];
          if (damageShieldAt(eb.x, eb.y)) { enemyBullets.splice(i, 1); continue; }
          if (rectHit(eb, { x: player.x, y: player.y, w: player.w, h: player.h })) {
            enemyBullets.splice(i, 1);
            hitPlayer();
          }
        }

        for (i = powerups.length - 1; i >= 0; i--) {
          if (circleRectHit(powerups[i], { x: player.x, y: player.y, w: player.w + 5, h: player.h + 5 })) {
            collectPowerup(powerups[i]);
            powerups.splice(i, 1);
          }
        }

        for (i = enemies.length - 1; i >= 0; i--) {
          if (enemies[i].type === 'boss') continue;
          for (j = shieldBlocks.length - 1; j >= 0; j--) {
            if (shieldBlocks[j].hp > 0 && Math.abs(enemies[i].x - shieldBlocks[j].x) < 15 && Math.abs(enemies[i].y - shieldBlocks[j].y) < 12) shieldBlocks[j].hp = 0;
          }
        }
      }

      function updateHud() {
        scoreLabel.textContent = String(Math.floor(score)).padStart(6, '0');
        livesLabel.textContent = Array(Math.max(0, lives) + 1).join('♥ ');
        var powers = [];
        if (player) {
          if (player.rapid > 0) powers.push('RAPID ' + Math.ceil(player.rapid));
          if (player.spread > 0) powers.push('SPREAD ' + Math.ceil(player.spread));
          if (player.shield > 0) powers.push('SHIELD');
        }
        powerLabel.textContent = powers.join(' · ');
      }

      function draw() {
        var scale = Math.min(cssW / WORLD_W, cssH / WORLD_H);
        var offsetX = (cssW - WORLD_W * scale) / 2;
        var offsetY = (cssH - WORLD_H * scale) / 2;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, cssW, cssH);
        ctx.fillStyle = '#03050d';
        ctx.fillRect(0, 0, cssW, cssH);
        ctx.save();
        ctx.translate(offsetX + (shake ? (Math.random() - 0.5) * shake : 0), offsetY + (shake ? (Math.random() - 0.5) * shake : 0));
        ctx.scale(scale, scale);

        drawBackground();
        drawShields();
        drawEnemies();
        drawBullets();
        drawPowerups();
        drawParticles();
        drawPlayer();

        if (waveClearTimer > 0) {
          ctx.fillStyle = 'rgba(3,5,13,0.48)';
          ctx.fillRect(0, 0, WORLD_W, WORLD_H);
          ctx.textAlign = 'center';
          ctx.fillStyle = '#47e6ff';
          ctx.font = '900 26px -apple-system, sans-serif';
          ctx.fillText('WAVE CLEARED', WORLD_W / 2, WORLD_H / 2 - 8);
          ctx.fillStyle = '#f5f7ff';
          ctx.font = '700 13px -apple-system, sans-serif';
          ctx.fillText('BONUS +' + (500 * (wave + 1)), WORLD_W / 2, WORLD_H / 2 + 19);
        }

        if (flash > 0) {
          ctx.fillStyle = 'rgba(255,255,255,' + Math.min(0.65, flash * 1.4) + ')';
          ctx.fillRect(0, 0, WORLD_W, WORLD_H);
        }
        ctx.restore();
      }

      function drawBackground() {
        var g = ctx.createLinearGradient(0, 0, 0, WORLD_H);
        g.addColorStop(0, '#0a1230');
        g.addColorStop(0.62, '#050817');
        g.addColorStop(1, '#02030a');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, WORLD_W, WORLD_H);

        for (var i = 0; i < stars.length; i++) {
          var s = stars[i];
          ctx.globalAlpha = s.a * (0.75 + Math.sin(elapsed * 2 + i) * 0.25);
          ctx.fillStyle = i % 7 === 0 ? '#8fdcff' : '#ffffff';
          ctx.fillRect(s.x, s.y, s.s, s.s);
        }
        ctx.globalAlpha = 1;

        ctx.strokeStyle = 'rgba(71,230,255,0.06)';
        ctx.lineWidth = 1;
        for (var y = WORLD_H - 130; y < WORLD_H; y += 16) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(WORLD_W, y);
          ctx.stroke();
        }
      }

      function drawPlayer() {
        if (!player) return;
        if (player.invincible > 0 && Math.floor(player.invincible * 12) % 2 === 0) return;
        ctx.save();
        ctx.translate(player.x, player.y);

        if (player.shield > 0) {
          ctx.strokeStyle = '#47e6ff';
          ctx.lineWidth = 2;
          ctx.globalAlpha = 0.6 + Math.sin(elapsed * 7) * 0.2;
          ctx.beginPath();
          ctx.arc(0, 0, 19, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        ctx.fillStyle = '#47e6ff';
        ctx.shadowColor = '#47e6ff';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(0, -13);
        ctx.lineTo(13, 9);
        ctx.lineTo(6, 7);
        ctx.lineTo(2, 12);
        ctx.lineTo(-2, 12);
        ctx.lineTo(-6, 7);
        ctx.lineTo(-13, 9);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#f5f7ff';
        ctx.fillRect(-2, -5, 4, 9);
        ctx.fillStyle = '#ff4fc8';
        ctx.fillRect(-5, 11, 3, 4 + Math.random() * 4);
        ctx.fillRect(2, 11, 3, 4 + Math.random() * 4);
        ctx.restore();
      }

      function drawEnemies() {
        for (var i = 0; i < enemies.length; i++) {
          var e = enemies[i];
          if (e.type === 'boss') drawBoss(e);
          else drawAlien(e);
        }
      }

      function drawAlien(e) {
        ctx.save();
        ctx.translate(Math.round(e.x), Math.round(e.y + Math.sin(e.phase) * 1.5));
        var colors = ['#8cff6a', '#47e6ff', '#ff4fc8'];
        ctx.fillStyle = colors[e.type];
        ctx.shadowColor = colors[e.type];
        ctx.shadowBlur = 5;
        var flap = Math.sin(e.phase * 2) > 0 ? 1 : 0;
        ctx.fillRect(-8, -7, 16, 3);
        ctx.fillRect(-11, -4, 22, 8);
        ctx.fillRect(-8, 4, 4, 4);
        ctx.fillRect(4, 4, 4, 4);
        ctx.fillRect(-12 - flap * 2, -1, 3, 6);
        ctx.fillRect(9 + flap * 2, -1, 3, 6);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#071020';
        ctx.fillRect(-5, -2, 3, 3);
        ctx.fillRect(2, -2, 3, 3);
        if (e.hp > 1) {
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 1;
          ctx.strokeRect(-12.5, -8.5, 25, 18);
        }
        ctx.restore();
      }

      function drawBoss(e) {
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.fillStyle = '#ff4fc8';
        ctx.shadowColor = '#ff4fc8';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(-48, -9);
        ctx.lineTo(-30, -20);
        ctx.lineTo(30, -20);
        ctx.lineTo(48, -9);
        ctx.lineTo(40, 17);
        ctx.lineTo(19, 13);
        ctx.lineTo(11, 21);
        ctx.lineTo(-11, 21);
        ctx.lineTo(-19, 13);
        ctx.lineTo(-40, 17);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#15112d';
        ctx.fillRect(-28, -8, 56, 13);
        ctx.fillStyle = '#ffd45a';
        for (var i = -2; i <= 2; i++) ctx.fillRect(i * 11 - 3, -5, 6, 6);
        ctx.fillStyle = '#47e6ff';
        ctx.fillRect(-8, 10, 16, 6);

        var pct = Math.max(0, e.hp / e.maxHp);
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.fillRect(-48, -29, 96, 4);
        ctx.fillStyle = pct > 0.35 ? '#8cff6a' : '#ff5b6e';
        ctx.fillRect(-48, -29, 96 * pct, 4);
        ctx.restore();
      }

      function drawBullets() {
        var i;
        ctx.shadowBlur = 7;
        ctx.shadowColor = '#8cff6a';
        ctx.fillStyle = '#d9ffca';
        for (i = 0; i < playerBullets.length; i++) {
          var p = playerBullets[i];
          ctx.fillRect(p.x - p.w / 2, p.y - p.h / 2, p.w, p.h);
        }
        ctx.shadowColor = '#ff5b6e';
        ctx.fillStyle = '#ff8d9a';
        for (i = 0; i < enemyBullets.length; i++) {
          var e = enemyBullets[i];
          ctx.fillRect(e.x - e.w / 2, e.y - e.h / 2, e.w, e.h);
          ctx.fillRect(e.x - 4, e.y - 1, 8, 2);
        }
        ctx.shadowBlur = 0;
      }

      function drawShields() {
        for (var i = 0; i < shieldBlocks.length; i++) {
          var s = shieldBlocks[i];
          if (s.hp <= 0) continue;
          ctx.fillStyle = s.hp === 2 ? '#8cff6a' : '#4e9e46';
          ctx.fillRect(s.x - 2.5, s.y - 2.5, 5, 5);
        }
      }

      function drawPowerups() {
        for (var i = 0; i < powerups.length; i++) {
          var p = powerups[i];
          var color = powerColor(p.type);
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.spin);
          ctx.strokeStyle = color;
          ctx.fillStyle = color;
          ctx.shadowColor = color;
          ctx.shadowBlur = 10;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.rect(-7, -7, 14, 14);
          ctx.stroke();
          ctx.rotate(-p.spin);
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.font = '900 9px -apple-system, sans-serif';
          ctx.fillText(p.type === 'rapid' ? 'R' : p.type === 'spread' ? 'S' : p.type === 'shield' ? 'O' : '+', 0, 0.5);
          ctx.restore();
        }
      }

      function drawParticles() {
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          ctx.globalAlpha = Math.max(0, p.life / p.max);
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        }
        ctx.globalAlpha = 1;
      }

      function loop(now) {
        var dt = Math.min(0.035, (now - lastTime) / 1000 || 0);
        lastTime = now;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      function bindHold(button, key) {
        function down(event) {
          event.preventDefault();
          initAudio();
          input[key] = true;
          button.classList.add('active');
          if (key === 'fire') firePlayer();
        }
        function up(event) {
          if (event) event.preventDefault();
          input[key] = false;
          button.classList.remove('active');
        }
        button.addEventListener('pointerdown', down);
        button.addEventListener('pointerup', up);
        button.addEventListener('pointercancel', up);
        button.addEventListener('pointerleave', up);
      }

      bindHold(leftBtn, 'left');
      bindHold(rightBtn, 'right');
      bindHold(fireBtn, 'fire');

      canvas.addEventListener('pointerdown', function (event) {
        if (state !== 'playing') return;
        event.preventDefault();
        dragActive = true;
        movePlayerToPointer(event);
      });
      canvas.addEventListener('pointermove', function (event) {
        if (!dragActive || state !== 'playing') return;
        event.preventDefault();
        movePlayerToPointer(event);
      });
      window.addEventListener('pointerup', function () { dragActive = false; });
      window.addEventListener('pointercancel', function () { dragActive = false; });

      function movePlayerToPointer(event) {
        var rect = canvas.getBoundingClientRect();
        var scale = Math.min(rect.width / WORLD_W, rect.height / WORLD_H);
        var ox = (rect.width - WORLD_W * scale) / 2;
        var x = (event.clientX - rect.left - ox) / scale;
        player.x = Math.max(16, Math.min(WORLD_W - 16, x));
      }

      window.addEventListener('keydown', function (event) {
        var k = event.key.toLowerCase();
        if (k === 'arrowleft' || k === 'a') { input.left = true; event.preventDefault(); }
        if (k === 'arrowright' || k === 'd') { input.right = true; event.preventDefault(); }
        if (k === ' ' || k === 'arrowup' || k === 'w') { input.fire = true; firePlayer(); event.preventDefault(); }
        if (k === 'p' || k === 'escape') { setPaused(state === 'playing'); event.preventDefault(); }
      });
      window.addEventListener('keyup', function (event) {
        var k = event.key.toLowerCase();
        if (k === 'arrowleft' || k === 'a') input.left = false;
        if (k === 'arrowright' || k === 'd') input.right = false;
        if (k === ' ' || k === 'arrowup' || k === 'w') input.fire = false;
      });

      startBtn.addEventListener('click', function () {
        if (state === 'paused') setPaused(false);
        else startGame();
      });
      pauseBtn.addEventListener('click', function () {
        initAudio();
        if (state === 'playing') setPaused(true);
        else if (state === 'paused') setPaused(false);
      });
      document.addEventListener('visibilitychange', function () {
        if (document.hidden && state === 'playing') setPaused(true);
      });
      window.addEventListener('resize', resize);

      resize();
      makeStars();
      updateHud();
      requestAnimationFrame(loop);
    }());
  </script>
</body>
</html>
