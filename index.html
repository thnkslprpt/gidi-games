<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080b22">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Gidi's Game Room</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07091a;
      --panel: #101633;
      --ink: #f7f8ff;
      --muted: #abb8df;
      --line: rgba(172, 194, 255, .18);
    }

    * { box-sizing: border-box; }

    html { min-width: 320px; background: var(--bg); }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 18%, rgba(83, 96, 255, .16), transparent 28rem),
        radial-gradient(circle at 88% 55%, rgba(255, 67, 190, .11), transparent 30rem),
        #07091a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .55;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.9) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(96,221,255,.8) 0 1px, transparent 1.5px);
      background-position: 0 0, 23px 31px;
      background-size: 67px 67px, 97px 97px;
      mask-image: linear-gradient(to bottom, black, transparent 82%);
      -webkit-mask-image: linear-gradient(to bottom, black, transparent 82%);
    }

    .hero {
      position: relative;
      isolation: isolate;
      min-height: 240px;
      overflow: hidden;
      border-bottom: 1px solid rgba(113, 225, 255, .28);
      background:
        radial-gradient(circle at 78% 40%, rgba(85, 222, 255, .28), transparent 18rem),
        radial-gradient(circle at 18% 0%, rgba(166, 88, 255, .36), transparent 25rem),
        linear-gradient(135deg, #101947 0%, #10102f 48%, #260d3b 100%);
      box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 330px;
      height: 330px;
      right: -72px;
      top: -126px;
      border: 1px solid rgba(110, 231, 255, .28);
      border-radius: 50%;
      box-shadow: 0 0 0 35px rgba(110, 231, 255, .035), 0 0 0 74px rgba(255, 93, 203, .025);
      z-index: -1;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: -54px;
      height: 92px;
      border-radius: 50% 50% 0 0;
      background: var(--bg);
      z-index: -1;
    }

    .hero-inner {
      width: min(100% - 32px, 920px);
      min-height: 205px;
      margin: 0 auto;
      padding: max(26px, env(safe-area-inset-top)) 0 28px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 24px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: max-content;
      max-width: 100%;
      padding: 7px 11px;
      border: 1px solid rgba(132, 231, 255, .32);
      border-radius: 999px;
      color: #c9f6ff;
      background: rgba(36, 71, 121, .34);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .09em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .eyebrow::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: #6cf4ae; box-shadow: 0 0 12px #6cf4ae; }

    h1 {
      max-width: 640px;
      margin: 13px 0 8px;
      font-size: clamp(37px, 8vw, 68px);
      line-height: .9;
      letter-spacing: -.055em;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, #75eeff, #a88cff 48%, #ff70ca);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 34px rgba(112, 218, 255, .16);
    }

    .subtitle { margin: 0; color: #ced8f6; font-size: 16px; line-height: 1.4; }

    .hero-art {
      position: relative;
      width: 170px;
      height: 150px;
      justify-self: end;
      filter: drop-shadow(0 20px 24px rgba(0, 0, 0, .32));
      animation: hover 4.3s ease-in-out infinite;
    }

    .hero-art svg { width: 100%; height: 100%; overflow: visible; }

    main {
      position: relative;
      width: min(100% - 24px, 920px);
      margin: -18px auto 0;
      padding: 0 0 max(34px, env(safe-area-inset-bottom));
      z-index: 2;
    }

    .grid-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 2px 13px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .grid-label span:last-child { color: #73e6ff; }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(142px, 1fr));
      gap: 14px;
    }

    .game-tile {
      --accent: #70e8ff;
      --accent-2: #a56cff;
      position: relative;
      aspect-ratio: 1 / 1;
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 11px;
      padding: 15px 11px 13px;
      border: 1px solid rgba(var(--accent-rgb), .38);
      border-radius: 24px;
      color: white;
      text-align: center;
      text-decoration: none;
      background:
        radial-gradient(circle at 50% 24%, rgba(var(--accent-rgb), .20), transparent 45%),
        linear-gradient(155deg, rgba(24, 33, 75, .98), rgba(10, 13, 36, .98));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 14px 28px rgba(0,0,0,.23);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      animation: tileIn .5s both;
      animation-delay: var(--delay);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .game-tile::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,.1), transparent 28%, transparent 72%, rgba(var(--accent-2-rgb), .12));
    }

    .game-tile::after {
      content: "";
      position: absolute;
      width: 82px;
      height: 82px;
      right: -42px;
      bottom: -42px;
      border: 1px solid rgba(var(--accent-2-rgb), .36);
      border-radius: 50%;
      box-shadow: 0 0 0 15px rgba(var(--accent-2-rgb), .04);
    }

    .tile-glow {
      position: absolute;
      width: 95px;
      height: 95px;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: var(--accent);
      opacity: .13;
      filter: blur(22px);
      pointer-events: none;
    }

    .icon-stage {
      position: relative;
      width: clamp(70px, 48%, 94px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      transform-origin: 50% 70%;
      transition: transform .18s ease;
      z-index: 1;
    }

    .icon-stage svg { width: 100%; height: 100%; overflow: visible; }

    .game-name {
      position: relative;
      z-index: 1;
      max-width: 100%;
      font-size: clamp(15px, 3.2vw, 18px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -.025em;
      text-wrap: balance;
      text-shadow: 0 2px 10px rgba(0,0,0,.4);
    }

    .game-tile:focus-visible { outline: 3px solid white; outline-offset: 3px; }
    .game-tile:active { transform: scale(.965); }

    @media (hover: hover) {
      .game-tile:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 18px 38px rgba(var(--accent-rgb), .18); }
      .game-tile:hover .icon-stage { transform: translateY(-3px) scale(1.07) rotate(-2deg); }
    }

    @media (max-width: 620px) {
      .hero { min-height: 223px; }
      .hero-inner { min-height: 195px; grid-template-columns: minmax(0, 1fr) 105px; gap: 8px; }
      .hero-art { width: 112px; height: 108px; }
      .subtitle { font-size: 14px; }
      main { margin-top: -11px; }
      .game-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    }

    @media (max-width: 370px) {
      .hero-inner { width: min(100% - 24px, 920px); grid-template-columns: 1fr 82px; }
      .hero-art { width: 86px; height: 92px; }
      .eyebrow { font-size: 10px; padding: 6px 9px; }
      h1 { font-size: 39px; }
      .subtitle { max-width: 220px; font-size: 13px; }
      main { width: calc(100% - 20px); }
      .game-grid { gap: 10px; }
      .game-tile { border-radius: 20px; padding: 11px 8px 10px; gap: 7px; }
      .icon-stage { width: 68px; }
      .game-name { font-size: 15px; }
    }

    @keyframes hover { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-9px) rotate(1deg); } }
    @keyframes tileIn { from { opacity: 0; transform: translateY(12px) scale(.97); } to { opacity: 1; transform: none; } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
